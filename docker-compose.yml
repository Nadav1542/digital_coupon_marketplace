services:
  mongo:
    image: mongo:7
    container_name: coupon_mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: coupon_api
    ports:
      - "3000:3000"
    env_file:
      - ./api/.env
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./api:/app
      - /app/node_modules

  frontend:
    image: nginx:alpine
    container_name: coupon_frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  mongo_data:
