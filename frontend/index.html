<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coupon Marketplace</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .hero { text-align: center; padding: 100px 20px 60px; }
    .hero h1 { font-size: 2.2rem; color: #1a1a2e; margin-bottom: 12px; }
    .hero p  { font-size: 1.1rem; color: #6b7280; margin-bottom: 40px; }
    .mode-cards { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
    .mode-card {
      background: #fff; border-radius: 12px; padding: 40px 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center;
      width: 280px; transition: transform 0.15s, box-shadow 0.15s;
      cursor: pointer; text-decoration: none; color: inherit;
    }
    .mode-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      text-decoration: none;
    }
    .mode-card .icon { font-size: 2.5rem; margin-bottom: 16px; }
    .mode-card h2 { font-size: 1.2rem; margin-bottom: 8px; }
    .mode-card p { font-size: 0.9rem; color: #6b7280; }
  </style>
</head>
<body>
  <header>
    <h1>Coupon Marketplace</h1>
  </header>

  <div class="hero">
    <h1>Digital Coupon Marketplace</h1>
    <p>Buy digital coupons instantly or manage your inventory</p>

    <div class="mode-cards">
      <a href="/customer.html" class="mode-card">
        <div class="icon">🛒</div>
        <h2>Customer</h2>
        <p>Browse and purchase digital coupons at great prices</p>
      </a>

      <a href="/admin.html" class="mode-card">
        <div class="icon">⚙️</div>
        <h2>Admin</h2>
        <p>Manage products, create coupons, and view inventory</p>
      </a>
    </div>
  </div>
</body>
</html>
