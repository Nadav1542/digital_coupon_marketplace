<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Coupon Marketplace</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>Coupon Marketplace <span class="badge">ADMIN</span></h1>
    <nav>
      <a href="/">Home</a>
      <a href="#" id="logoutBtn" class="hidden">Logout</a>
    </nav>
  </header>

  <div class="container">
    <!-- ─── Toast Container ──────────────────────── -->
    <div class="toast-container" id="toasts"></div>

    <!-- ─── Login Section ────────────────────────── -->
    <div id="loginSection">
      <div class="login-wrapper">
        <div class="panel">
          <h2>Admin Login</h2>
          <div id="loginError" class="alert alert-error hidden"></div>
          <form id="loginForm">
            <div class="form-group">
              <label for="username">Username</label>
              <input type="text" id="username" required autocomplete="username">
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <input type="password" id="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
          </form>
        </div>
      </div>
    </div>

    <!-- ─── Dashboard (shown after login) ────────── -->
    <div id="dashboardSection" class="hidden">

      <!-- Create Coupon Panel -->
      <div class="panel">
        <h2>Create New Coupon</h2>
        <form id="createForm">
          <div class="form-group">
            <label for="cName">Name *</label>
            <input type="text" id="cName" required placeholder="e.g. Amazon $50 Gift Card">
          </div>
          <div class="form-group">
            <label for="cDesc">Description *</label>
            <textarea id="cDesc" rows="2" required placeholder="e.g. Redeemable on amazon.com"></textarea>
          </div>
          <div class="form-group">
            <label for="cImage">Image URL *</label>
            <input type="url" id="cImage" required placeholder="https://example.com/image.png">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="cCost">Cost Price ($) *</label>
              <input type="number" id="cCost" min="0" step="0.01" required placeholder="40">
            </div>
            <div class="form-group">
              <label for="cMargin">Margin (%) *</label>
              <input type="number" id="cMargin" min="0" step="0.01" required placeholder="25">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="cValueType">Value Type *</label>
              <select id="cValueType">
                <option value="STRING">STRING</option>
                <option value="IMAGE">IMAGE</option>
              </select>
            </div>
            <div class="form-group">
              <label for="cValue">Coupon Value *</label>
              <input type="text" id="cValue" required placeholder="e.g. AMZ-50-ABCD-1234">
            </div>
          </div>
          <div id="computedPrice" class="text-muted mb-2" style="font-size:0.85rem;"></div>
          <button type="submit" class="btn btn-success" id="createBtn">Create Coupon</button>
        </form>
      </div>

      <!-- Coupon List Panel -->
      <div class="panel">
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; padding-bottom:10px; border-bottom:1px solid #e5e7eb;">
          <h2 style="border:none; margin:0; padding:0;">All Coupons</h2>
          <button class="btn btn-secondary btn-sm" id="refreshBtn">Refresh</button>
        </div>

        <!-- Filters -->
        <div style="display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; align-items:center;">
          <label style="font-size:0.85rem; font-weight:600;">Filter:</label>
          <select id="filterSold" style="padding:6px 10px; border:1px solid #d1d5db; border-radius:6px; font-size:0.85rem;">
            <option value="">All</option>
            <option value="false">Available</option>
            <option value="true">Sold</option>
          </select>
          <select id="filterDeleted" style="padding:6px 10px; border:1px solid #d1d5db; border-radius:6px; font-size:0.85rem;">
            <option value="">Active & Deleted</option>
            <option value="false" selected>Active Only</option>
            <option value="true">Deleted Only</option>
          </select>
        </div>

        <div id="couponList">
          <div class="empty-state">
            <p>Loading coupons...</p>
          </div>
        </div>
      </div>

    </div><!-- /dashboardSection -->
  </div>

  <script src="/admin.js"></script>
</body>
</html>
